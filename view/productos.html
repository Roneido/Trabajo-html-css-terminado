<!DOCTYPE html>
<html lang="es"> <!-- Idioma de la página: español -->

<head>
    <!-- Configuración de codificación de caracteres -->
    <meta charset="UTF-8">
    <!-- Configuración responsiva para dispositivos móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título que aparece en la pestaña del navegador -->
    <title>NieR - Productos</title>
    <!-- Vinculación con la hoja de estilos CSS específica para productos -->
    <link rel="stylesheet" href="../css/productos.css">
</head>

<body>
    <!-- ENCABEZADO: contiene el logo principal -->
    <header>
        <h1>
            <img src="../images/Nier-Automata-Logo-PNG.png" alt="NieR Automata Logo" style="max-width: 100%; height: auto;">
            <!-- Logo principal de la página con atributo alt para accesibilidad -->
        </h1>
    </header>

    <!-- NAVEGACIÓN: enlaces principales del sitio -->
    <nav>
        <a href="../index.html">Inicio</a> <!-- Enlace a la página principal -->

        <a href="contacto.html">Contacto</a> <!-- Enlace a la página de contacto -->
    </nav>

    <!-- CONTENIDO PRINCIPAL: sección de productos -->
    <main class="product-page">
        <h2>Otros videojuegos de la Empresa</h2>
        <!-- GRID DE PRODUCTOS: organiza los artículos en un grid responsivo -->
        <section class="product-grid">
            <!-- ARTÍCULO: producto individual -->
            <article class="product-item">
                <img src="../images/1336-final-fantasy-vii-rebirth-ps5.webp" alt="Final Fantasy VII Rebirth">

                <!-- Título del producto -->
            </article>

            <article class="product-item">
                <img src="../images/61HahlWFLVL._AC_UF894,1000_QL80_.jpg" alt="Artwork 1">
                <h3>Drakegard</h3>
            </article>

            <article class="product-item">
                <img src="../images/6rTn6YQ82JF8KBmXIJs0CRdrqniy8y6c.webp" alt="Artwork 2">
                <h3>Final fantasy x</h3>
            </article>

            <article class="product-item">
                <img src="../images/71E2LVTnI6S._AC_UF894,1000_QL80_.jpg" alt="Artwork 3">
                <h3>Kingdom hearts</h3>
            </article>

            <article class="product-item">
                <img src="../images/IZEXjCSSvNkDE3AAb0iafW8k.webp" alt="Artwork 4">
                <h3>Nier replicant</h3>
            </article>

            <article class="product-item">
                <img src="../images/final-fantasy-vi-2016107145435_1.jpg" alt="Final Fantasy VI">
                <h3>Final Fantasy VI</h3>
            </article>
        </section>
    </main>

    <!-- PIE DE PÁGINA -->
    <footer>
        <!-- Información de ubicación -->
        <p>📍 Dirección: C. de Murcia 30420 Calasparra, Murcia</p>
        <!-- Derechos de autor -->
        <p>© NieR</p>

        <!-- ENLACES A REDES SOCIALES -->
        <a href="https://twitter.com/" target="_blank" rel="noopener noreferrer">
            <img src="../images/gorjeo.png" alt="Twitter" width="40" height="40">
            <!-- Enlace a Twitter; rel="noopener noreferrer" protege la seguridad al abrir nueva pestaña -->
        </a>

        <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">
            <img src="../images/instagram.png" alt="Instagram" width="40" height="40">
        </a>

        <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">
            <img src="../images/youtube.png" alt="YouTube" width="40" height="40">
        </a>

        <!-- Enlace a página de aviso legal -->
        <a href="view/aviso-legal.html">Aviso legal</a>
