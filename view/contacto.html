<!DOCTYPE html>
<html lang="es"> <!-- Idioma de la página: español -->

<head>
    <!-- Configuración de codificación de caracteres -->
    <meta charset="UTF-8">
    <!-- Configuración responsiva para dispositivos móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título visible en la pestaña del navegador -->
    <title>NieR</title>
    <!-- Vinculación con la hoja de estilos CSS específica para la página de contacto -->
    <link rel="stylesheet" href="../css/contacto.css">
</head>

<body>
    <!-- ENCABEZADO: contiene el logo principal -->
    <header>
        <h1>
            <img src="../images/Nier-Automata-Logo-PNG.png" alt="NieR Automata Logo" style="max-width: 100%; height: auto;">
            <!-- Logo principal de la página con atributo alt para accesibilidad -->
        </h1>
    </header>

    <!-- NAVEGACIÓN: enlaces principales del sitio -->
    <nav>
        <a href="../index.html">Inicio</a> <!-- Enlace a la página principal -->

        <a href="productos.html">Productos</a> <!-- Enlace a la página de productos -->

            <!-- Título de la sección que indica la localización de la empresa -->
        </div>
        <img src="../images/latest.png" alt="Latest">

        <a href="https://twitter.com/" target="_blank" rel="noopener noreferrer">
            <img src="../images/gorjeo.png" alt="Twitter" width="40" height="40">
            <!-- Icono de Twitter; rel="noopener noreferrer" protege la seguridad al abrir nueva pestaña -->
        </a>

        <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">
            <img src="../images/instagram.png" alt="Instagram" width="40" height="40">
            <!-- Icono de Instagram -->
        </a>

        <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">
            <img src="../images/youtube.png" alt="YouTube" width="40" height="40">
            <!-- Icono de YouTube -->
        </a>

        <!-- Enlace a página de aviso legal -->
        <a href="view/aviso-legal.html">Aviso legal</a>
